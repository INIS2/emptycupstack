<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty Cup Stack</title>
  <meta
    name="description"
    content="Minimal portfolio landing page with a stacked cup motif"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <h1>Empty Cup Stack</h1>
    </header>

    <main class="showcase">
      <section class="stack-panel" aria-label="Project stack">
        <div class="stack-stage">          <div id="cup-stack" class="cup-stack" aria-live="polite"></div>
        </div>
      </section>

      <aside class="detail-panel" aria-live="polite">
        <h2 id="detail-title">Project</h2>
        <p id="detail-desc">Hover over a cup to read the project.</p>
        <a
          id="detail-link"
          class="detail-link is-disabled"
          href="#"
          target="_blank"
          rel="noreferrer"
          aria-disabled="true"
        >
          Open Project
        </a>
      </aside>
    </main>
  </div>

  <template id="cup-template">
    <a class="cup-card" href="#" target="_blank" rel="noreferrer">
      <img class="cup-image" src="./assets/img/cup.png" alt="" aria-hidden="true">
      <span class="cup-label"></span>
      <span class="cup-index" aria-hidden="true"></span>
    </a>
  </template>

  <script src="./assets/js/script.js" type="module"></script>
</body>
</html>
