<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty Cup Stack</title>
  <meta
    name="description"
    content="Minimal portfolio landing page with a stacked cup motif"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p>Selected works</p>
      <div class="hero-title-row">
        <h1>Empty Cup Stack</h1>
        <div class="stack-count" aria-live="polite">
          <span id="stack-current">--</span>
          <span class="stack-count-divider" aria-hidden="true">/</span>
          <span id="stack-total">--</span>
        </div>
      </div>
    </header>

    <main class="showcase">
      <section class="stack-panel" aria-label="Project stack">
        <div class="stack-stage">
          <div id="cup-stack" class="cup-stack" aria-live="polite"></div>
        </div>
      </section>
    </main>
  </div>

  <template id="cup-template">
    <article class="cup-card">
      <button class="cup-toggle" type="button" aria-expanded="false">
        <span class="cup-visual">
          <img class="cup-image" src="./assets/img/cup.png" alt="" aria-hidden="true">
        </span>
      </button>
      <div class="cup-index">
        <button class="cup-summary" type="button" aria-expanded="false"></button>
        <div class="cup-actions">
          <div class="cup-action-group">
            <a class="cup-link cup-link-coffee" data-link="page-coffee" href="#">COFFEE Page</a>
            <a class="cup-link" data-link="page-current" href="#">Page 현재창</a>
            <a class="cup-link" data-link="page-new" href="#" target="_blank" rel="noreferrer">Page 새창</a>
          </div>
          <div class="cup-action-group">
            <a class="cup-link cup-link-secondary cup-link-coffee" data-link="github-coffee" href="#">COFFEE GitHub</a>
            <a class="cup-link cup-link-secondary" data-link="github-current" href="#">GitHub 현재창</a>
            <a class="cup-link cup-link-secondary" data-link="github-new" href="#" target="_blank" rel="noreferrer">GitHub 새창</a>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="./assets/js/script.js" type="module"></script>
</body>
</html>
