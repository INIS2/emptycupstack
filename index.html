<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty Cup Stack</title>
  <meta
    name="description"
    content="완료한 프로젝트를 빈 컵처럼 차곡차곡 쌓아 올린 포트폴리오 랜딩페이지"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="hero-kicker">Empty Cup Stack</p>
      <h1>비워낸 컵 하나마다<br>완료한 프로젝트 하나.</h1>
      <p class="hero-copy">
        아래 컵은 JSON에 기록된 작업물 수만큼 쌓입니다.
        컵에 마우스를 올리면 프로젝트 설명과 링크가 옆으로 열립니다.
      </p>
    </header>

    <main class="showcase">
      <section class="stack-panel" aria-labelledby="stack-title">
        <div class="stack-panel-head">
          <h2 id="stack-title">Project Stack</h2>
          <p id="project-count" class="count-label">0 cups loaded</p>
        </div>
        <div class="stack-stage">
          <div class="stack-shadow" aria-hidden="true"></div>
          <div id="cup-stack" class="cup-stack" aria-live="polite"></div>
        </div>
      </section>

      <aside class="detail-panel" aria-live="polite">
        <p class="detail-label">Hover a cup</p>
        <h2 id="detail-title">프로젝트를 선택하세요</h2>
        <p id="detail-desc">
          컵은 프로젝트 하나를 뜻합니다. 쌓인 컵 중 하나에 커서를 올리면
          제목, 설명, URL이 여기에 표시됩니다.
        </p>
        <a
          id="detail-link"
          class="detail-link is-disabled"
          href="#"
          target="_blank"
          rel="noreferrer"
          aria-disabled="true"
        >
          프로젝트 열기
        </a>
      </aside>
    </main>
  </div>

  <template id="cup-template">
    <a class="cup-card" href="#" target="_blank" rel="noreferrer">
      <img class="cup-image" src="./assets/img/cup.png" alt="" aria-hidden="true">
      <span class="cup-label"></span>
      <span class="cup-index" aria-hidden="true"></span>
    </a>
  </template>

  <script src="./assets/js/script.js" type="module"></script>
</body>
</html>
